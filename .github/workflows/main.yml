name: 超星学习通自动刷课

on:
  workflow_dispatch:
    inputs:
      username:
        description: '18588995298'
        required: false
        default: ''
      password:
        description: '20071216yyx'
        required: false
        default: ''
      course_list:
        description: '264391804'
        required: false
        default: ''
      speed:
        description: '视频倍速 (1-2)'
        required: false
        default: '1'
      notopen_action:
        description: '未开放章节处理策略'
        required: false
        default: 'retry'
        type: choice
        options:
          - retry
          - ask
          - continue

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成配置文件
        run: |
          cat > config.ini << EOF
          [common]
          username = ${USERNAME}
          password = ${PASSWORD}
          course_list = ${COURSE_LIST}
          speed = ${SPEED}
          notopen_action = ${NOTOPEN_ACTION}

          [tiku]
          provider = Doubao
          submit = true
          cover_rate = 0.8
          true_list = 正确,对,√,是
          false_list = 错误,错,×,否,不对,不正确
          doubao_endpoint = https://api.deepseek.com/v1/chat/completions
          doubao_api_key = ${DEEPSEEK_API_KEY}
          doubao_model = deepseek-chat
          doubao_min_interval = 1
          EOF
        env:
          USERNAME: ${{ github.event.inputs.username || '13800138000' }}
          PASSWORD: ${{ github.event.inputs.password || 'your_password' }}
          COURSE_LIST: ${{ github.event.inputs.course_list || '' }}
          SPEED: ${{ github.event.inputs.speed || '1' }}
          NOTOPEN_ACTION: ${{ github.event.inputs.notopen_action || 'retry' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 运行刷课程序
        run: python main.py -c config.ini
